services:
  - type: web
    name: saludenlinea
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: BASE_URL
        value: https://saludenlinea.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://saludenlinea.onrender.com
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

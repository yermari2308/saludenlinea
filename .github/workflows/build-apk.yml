name: Build y Publicar APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Instalar dependencias
        working-directory: flutter_app
        run: flutter pub get

      - name: Compilar APK release
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Renombrar APK
        run: cp flutter_app/build/app/outputs/flutter-apk/app-release.apk SaludEnLinea.apk

      - name: Verificar URL en APK
        run: strings SaludEnLinea.apk | grep -o 'railway\|onrender\|workers\.dev' | head -5 || true

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: SaludEnLínea v1.0.0
          body: APK actualizado - conecta con Railway
          files: SaludEnLinea.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build y Publicar APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable

      - name: Instalar dependencias
        working-directory: flutter_app
        run: flutter pub get

      - name: Compilar APK release
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Eliminar release anterior
        run: |
          gh release delete v1.0.0 --yes 2>/dev/null || true
          git push --delete origin v1.0.0 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar nuevo release con APK
        run: |
          gh release create v1.0.0 \
            flutter_app/build/app/outputs/flutter-apk/app-release.apk \
            --title "SaludEnLínea v1.0.0" \
            --notes "APK actualizado automáticamente" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

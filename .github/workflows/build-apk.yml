name: Build y Publicar APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable

      - name: Obtener dependencias
        working-directory: flutter_app
        run: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "sdk.dir=$ANDROID_HOME" >> android/local.properties
          flutter clean
          flutter pub get

      - name: Compilar APK release
        working-directory: flutter_app
        run: flutter build apk --release

      - name: Mostrar SHA-1 del keystore CI
        run: keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>&1 | tee /tmp/keystore_info.txt && grep -i "sha" /tmp/keystore_info.txt || cat /tmp/keystore_info.txt

      - name: Buscar y subir APK
        run: |
          APK=$(find . -name "app-release.apk" 2>/dev/null | head -1)
          echo "APK: $APK"
          cp "$APK" SaludEnLinea.apk

      - name: Publicar release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: SaludEnLínea v1.0.${{ github.run_number }}
          body: APK listo para descargar
          files: SaludEnLinea.apk
          make_latest: true
